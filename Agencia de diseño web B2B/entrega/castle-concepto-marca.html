document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;height:9px;background:#1A1917;margin-top:26px;flex:none\"><\u002Fspan>\n      <h1 style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:80px;line-height:0.96;letter-spacing:-0.035em\">Menos,<br>mejor.<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"margin:36px 0 0 23px;max-width:520px;font-size:17px;line-height:1.55;color:#56544F\">Diseño, creación y desarrollo web para empresas. Una presencia digital profesional, sin ruido.<\u002Fp>\n\n    <!-- DIVIDER -->\n    <div style=\"height:1px;background:#DEDCD6;margin:80px 0 0\"><\u002Fdiv>\n\n    <!-- SECTION 01 — SLOGANS -->\n    <div style=\"display:flex;align-items:baseline;gap:18px;padding:56px 0 8px\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.22em;color:#8C8A85\">01<\u002Fspan>\n      <h2 style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#8C8A85;font-weight:500\">Opciones de eslogan<\u002Fh2>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ slogans }}\" as=\"s\" hint-placeholder-count=\"5\">\n      <div style=\"display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:24px;padding:26px 0;border-top:1px solid #DEDCD6\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#B6B3AC\">{{ s.no }}<\u002Fspan>\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:500;font-size:34px;letter-spacing:-0.02em;color:#1A1917\">{{ s.text }}<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8C8A85;justify-self:end\">{{ s.idea }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <!-- SECTION 02 — LOGO CONCEPTS -->\n    <div style=\"display:flex;align-items:baseline;gap:18px;padding:96px 0 36px;border-top:1px solid #DEDCD6;margin-top:8px\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.22em;color:#8C8A85\">02<\u002Fspan>\n      <h2 style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#8C8A85;font-weight:500\">Conceptos de logotipo<\u002Fh2>\n    <\u002Fdiv>\n\n    <!-- CONCEPT 1 — RETÍCULA -->\n    <div style=\"display:grid;grid-template-columns:200px 1fr;gap:48px;padding:48px 0;border-top:1px solid #DEDCD6\">\n      <div>\n        <div style=\"width:200px;height:200px;border:1px solid #DEDCD6;background:#FBFAF8;display:flex;align-items:center;justify-content:center\">\n          <svg width=\"84\" height=\"84\" viewBox=\"0 0 64 64\" fill=\"none\">\n            <rect x=\"8\" y=\"8\" width=\"48\" height=\"48\" stroke=\"#1A1917\" stroke-width=\"1.5\"><\u002Frect>\n            <line x1=\"32\" y1=\"8\" x2=\"32\" y2=\"56\" stroke=\"#1A1917\" stroke-width=\"1.5\"><\u002Fline>\n            <line x1=\"8\" y1=\"32\" x2=\"56\" y2=\"32\" stroke=\"#1A1917\" stroke-width=\"1.5\"><\u002Fline>\n            <rect x=\"32\" y=\"8\" width=\"24\" height=\"24\" fill=\"#1A1917\"><\u002Frect>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#B6B3AC;margin-top:14px\">CONCEPTO 01<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:28px;letter-spacing:0.02em;color:#1A1917\">retícula<\u002Fdiv>\n        <div style=\"margin-top:24px;display:grid;grid-template-columns:96px 1fr;gap:8px 24px;font-size:15px;line-height:1.55\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Isotipo<\u002Fspan>\n          <span style=\"color:#56544F\">Un cuadrado de líneas finas dividido en retícula 2×2; una celda sólida marca el punto de partida. Evoca la estructura y el orden de la web.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Tipografía<\u002Fspan>\n          <span style=\"color:#56544F\">Grotesca geométrica en minúsculas — <span style=\"color:#1A1917\">Space Grotesk<\u002Fspan>. Trazo uniforme, espaciado abierto.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:5px\">Paleta<\u002Fspan>\n          <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#1A1917;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Carbón #1A1917<\u002Fspan><\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#F5F4F1;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Hueso #F5F4F1<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#B6B3AC;margin-top:26px\">Monocromático<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CONCEPT 2 — SINTAXIS -->\n    <div style=\"display:grid;grid-template-columns:200px 1fr;gap:48px;padding:48px 0;border-top:1px solid #DEDCD6\">\n      <div>\n        <div style=\"width:200px;height:200px;border:1px solid #DEDCD6;background:#FBFAF8;display:flex;align-items:center;justify-content:center\">\n          <svg width=\"92\" height=\"92\" viewBox=\"0 0 64 64\" fill=\"none\">\n            <polyline points=\"26,16 12,32 26,48\" stroke=\"#2B2A28\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n            <polyline points=\"38,16 52,32 38,48\" stroke=\"#2B2A28\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n            <line x1=\"34\" y1=\"14\" x2=\"30\" y2=\"50\" stroke=\"#2B2A28\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#B6B3AC;margin-top:14px\">CONCEPTO 02<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Manrope',sans-serif;font-weight:600;font-size:28px;letter-spacing:-0.01em;color:#2B2A28\">sintaxis<\u002Fdiv>\n        <div style=\"margin-top:24px;display:grid;grid-template-columns:96px 1fr;gap:8px 24px;font-size:15px;line-height:1.55\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Isotipo<\u002Fspan>\n          <span style=\"color:#56544F\">Un par de corchetes angulares <span style=\"font-family:'JetBrains Mono',monospace;color:#1A1917\">&lt; &gt;<\u002Fspan> reducidos a su línea esencial. Referencia al código, sin literalidad.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Tipografía<\u002Fspan>\n          <span style=\"color:#56544F\">Sans humanista de peso medio — <span style=\"color:#1A1917\">Manrope<\u002Fspan>. Cercana, legible, profesional.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:5px\">Paleta<\u002Fspan>\n          <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#2B2A28;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Grafito #2B2A28<\u002Fspan><\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#ECEAE5;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Niebla #ECEAE5<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#B6B3AC;margin-top:26px\">Dos tonos<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CONCEPT 3 — ASCENSO -->\n    <div style=\"display:grid;grid-template-columns:200px 1fr;gap:48px;padding:48px 0;border-top:1px solid #DEDCD6\">\n      <div>\n        <div style=\"width:200px;height:200px;border:1px solid #DEDCD6;background:#FBFAF8;display:flex;align-items:center;justify-content:center\">\n          <svg width=\"88\" height=\"88\" viewBox=\"0 0 64 64\" fill=\"none\">\n            <line x1=\"16\" y1=\"50\" x2=\"16\" y2=\"40\" stroke=\"#1A1917\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"28\" y1=\"50\" x2=\"28\" y2=\"32\" stroke=\"#1A1917\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"40\" y1=\"50\" x2=\"40\" y2=\"22\" stroke=\"#1A1917\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"48\" cy=\"14\" r=\"4.5\" fill=\"none\" stroke=\"#5E7488\" stroke-width=\"2\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#B6B3AC;margin-top:14px\">CONCEPTO 03<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:28px;letter-spacing:-0.01em;color:#1A1917\">ascenso<\u002Fdiv>\n        <div style=\"margin-top:24px;display:grid;grid-template-columns:96px 1fr;gap:8px 24px;font-size:15px;line-height:1.55\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Isotipo<\u002Fspan>\n          <span style=\"color:#56544F\">Tres trazos verticales en progresión con un nodo superior. Sugiere crecimiento y conexión digital.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:3px\">Tipografía<\u002Fspan>\n          <span style=\"color:#56544F\">Grotesca contemporánea — <span style=\"color:#1A1917\">Archivo<\u002Fspan>, con un peso semibold que ancla el nodo.<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8C8A85;padding-top:5px\">Paleta<\u002Fspan>\n          <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#1A1917;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Tinta #1A1917<\u002Fspan><\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#F5F4F1;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Hueso #F5F4F1<\u002Fspan><\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:8px\"><span style=\"width:18px;height:18px;background:#5E7488;border:1px solid #DEDCD6\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#56544F\">Pizarra #5E7488<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#B6B3AC;margin-top:26px\">Monocromático + acento sutil<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FOOTER -->\n    <div style=\"border-top:1px solid #DEDCD6;margin-top:40px;padding-top:28px;display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#B6B3AC\">\n      <span>Conceptos sin nombre definido<\u002Fspan>\n      <span>Fin<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      slogans: [\n        { no: '01', text: 'Diseño que escala.',  idea: 'Crecimiento' },\n        { no: '02', text: 'Claridad digital.',    idea: 'Simplicidad' },\n        { no: '03', text: 'Presencia sin ruido.',  idea: 'Minimalismo' },\n        { no: '04', text: 'Crecemos tu marca.',    idea: 'Resultado' },\n        { no: '05', text: 'Simple por diseño.',    idea: 'Filosofía' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
